<style>
/* ===== MILES MORALES THEME ===== */
:root {
  --bg: #0a0a0f;
  --bg2: #0f0f1a;
  --surface: #12121f;
  --surface2: #1a1a2e;
  --surface3: #1e1e35;
  --border: #1f1f3a;
  --border2: #2a2a4a;
  --text: #f0f0ff;
  --text2: #8888aa;
  --text3: #44445a;
  --red: #e60f32;
  --red2: #ff1744;
  --red-soft: rgba(230,15,50,0.15);
  --red-glow: rgba(230,15,50,0.3);
  --blue: #1565ff;
  --blue2: #4488ff;
  --blue-soft: rgba(21,101,255,0.15);
  --blue-glow: rgba(21,101,255,0.3);
  --white: #ffffff;
  --white-soft: rgba(255,255,255,0.08);
  --green: #00e676;
  --green-soft: rgba(0,230,118,0.12);
  --yellow: #ffd600;
  --yellow-soft: rgba(255,214,0,0.12);
  --pink: #ff4081;
  --nav-h: 68px;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow-red: 0 0 20px rgba(230,15,50,0.4);
  --shadow-blue: 0 0 20px rgba(21,101,255,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
}

/* ===== SPIDER WEB BACKGROUND ===== */
.web-bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
}
.web-bg svg {
  position: absolute; width: 100%; height: 100%;
  opacity: 0.04;
}
.web-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}
.web-glow::before {
  content: '';
  position: absolute;
  top: -200px; right: -200px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(230,15,50,0.12) 0%, transparent 70%);
  animation: glowPulse 4s ease-in-out infinite;
}
.web-glow::after {
  content: '';
  position: absolute;
  bottom: -200px; left: -200px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(21,101,255,0.12) 0%, transparent 70%);
  animation: glowPulse 4s ease-in-out infinite 2s;
}
@keyframes glowPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.1); }
}

/* ===== APP SHELL ===== */
.app {
  position: relative; z-index: 1;
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ===== HEADER ===== */
.header {
  padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 14px;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; z-index: 10;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  animation: scanline 3s linear infinite;
}
@keyframes scanline {
  0% { transform: scaleX(0); transform-origin: left; }
  50% { transform: scaleX(1); transform-origin: left; }
  51% { transform: scaleX(1); transform-origin: right; }
  100% { transform: scaleX(0); transform-origin: right; }
}

.logo-area { display: flex; align-items: center; gap: 10px; }
.logo-spider {
  width: 36px; height: 36px;
  background: var(--red);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: var(--shadow-red);
  animation: logoPulse 3s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes logoPulse {
  0%, 100% { box-shadow: 0 0 10px rgba(230,15,50,0.5); }
  50% { box-shadow: 0 0 25px rgba(230,15,50,0.8), 0 0 50px rgba(230,15,50,0.3); }
}
.app-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #fff 0%, #ff4466 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.app-sub {
  font-size: 10px; color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
}

.header-actions { display: flex; gap: 8px; }
.hbtn {
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 17px;
  transition: all 0.2s;
}
.hbtn:active { transform: scale(0.9); }
.hbtn.red { border-color: var(--red); color: var(--red); background: var(--red-soft); }

/* ===== PAGES ===== */
.pages { flex: 1; overflow: hidden; position: relative; }
.page {
  position: absolute; inset: 0;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + 16px);
  display: none; opacity: 0;
}
.page.active { display: block; animation: pageIn 0.35s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes pageIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== QUOTE HERO ===== */
.quote-hero {
  margin: 14px 14px 0;
  background: linear-gradient(135deg, #0f0f1a 0%, #1a0a12 50%, #0a0f1a 100%);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 18px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.quote-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(230,15,50,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.quote-spider-icon {
  font-size: 28px;
  margin-bottom: 8px;
  display: block;
  animation: spiderBounce 2s ease-in-out infinite;
}
@keyframes spiderBounce {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-4px) rotate(5deg); }
}
.quote-label {
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--red); font-family: 'JetBrains Mono', monospace;
  margin-bottom: 8px;
}
.quote-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  line-height: 1.2;
  color: var(--white);
  letter-spacing: 1px;
  transition: opacity 0.4s;
}
.quote-author {
  font-size: 11px; color: var(--text2);
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
}
.quote-tap-hint {
  font-size: 9px; color: var(--text3);
  margin-top: 6px; letter-spacing: 1px;
}
.quote-corner {
  position: absolute; top: 12px; right: 14px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  color: var(--red);
  opacity: 0.08;
  line-height: 1;
  pointer-events: none;
}

/* ===== TODAY STRIP ===== */
.today-strip {
  margin: 10px 14px 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.today-info {}
.today-day {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 2px;
  background: linear-gradient(90deg, var(--red), var(--blue2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.today-date { font-size: 11px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
.now-class {
  text-align: right; max-width: 55%;
}
.now-label { font-size: 9px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.now-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.2; }
.now-time { font-size: 10px; color: var(--red); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

/* ===== DAY STRIP ===== */
.day-strip {
  display: flex; gap: 7px;
  padding: 12px 14px 0;
  overflow-x: auto; scrollbar-width: none;
}
.day-strip::-webkit-scrollbar { display: none; }

.day-pill {
  flex-shrink: 0;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all 0.2s;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.day-pill::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--red), var(--blue));
  opacity: 0; transition: opacity 0.2s;
}
.day-pill.active::before { opacity: 1; }
.day-pill.today-ring { border-color: var(--red); }
.day-pill-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px; letter-spacing: 1px;
  color: var(--text2); position: relative;
  transition: color 0.2s;
}
.day-pill.active .day-pill-name { color: white; }
.day-pill-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--red); margin: 3px auto 0;
  position: relative;
}
.day-pill.active .day-pill-dot { background: rgba(255,255,255,0.7); }

/* ===== SCHEDULE LIST ===== */
.schedule-list { padding: 10px 14px 0; }

.section-label {
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--text3); padding: 12px 2px 6px;
  font-family: 'JetBrains Mono', monospace;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.slot {
  display: flex; align-items: center; gap: 11px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 13px;
  margin-bottom: 7px;
  position: relative; overflow: hidden;
  transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
  animation: slotIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes slotIn {
  from { opacity: 0; transform: translateX(-12px); }
  to { opacity: 1; transform: translateX(0); }
}
.slot:nth-child(1) { animation-delay: 0.03s; }
.slot:nth-child(2) { animation-delay: 0.06s; }
.slot:nth-child(3) { animation-delay: 0.09s; }
.slot:nth-child(4) { animation-delay: 0.12s; }
.slot:nth-child(5) { animation-delay: 0.15s; }
.slot:nth-child(6) { animation-delay: 0.18s; }
.slot:nth-child(7) { animation-delay: 0.21s; }
.slot:nth-child(8) { animation-delay: 0.24s; }

.slot:active { transform: scale(0.98) translateX(0); }

.slot-bar {
  width: 3px; height: 100%;
  position: absolute; left: 0; top: 0;
  border-radius: 3px 0 0 3px;
}
.slot.college .slot-bar { background: var(--red); }
.slot.lab .slot-bar { background: var(--blue2); }
.slot.travel .slot-bar { background: var(--text3); }
.slot.meal .slot-bar { background: var(--yellow); }
.slot.study .slot-bar { background: var(--green); }
.slot.rest .slot-bar { background: var(--pink); }
.slot.break .slot-bar { background: var(--text3); }
.slot.sleep .slot-bar { background: #1a1a2e; }
.slot.club .slot-bar { background: var(--yellow); }

.slot.current {
  border-color: var(--red);
  background: rgba(230,15,50,0.08);
  box-shadow: 0 0 15px rgba(230,15,50,0.2);
}
.slot.current .slot-title { color: var(--red); }

.slot-icon { font-size: 20px; flex-shrink: 0; width: 32px; text-align: center; }

.slot-content { flex: 1; min-width: 0; }
.slot-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: 0.3px;
}
.slot-sub {
  font-size: 11px; color: var(--text2); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.slot-time {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--text3); text-align: right; flex-shrink: 0; line-height: 1.6;
}

.now-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 9px; color: var(--red);
  background: var(--red-soft);
  border: 1px solid var(--red);
  border-radius: 4px;
  padding: 1px 5px; margin-left: 6px;
  font-family: 'JetBrains Mono', monospace;
  animation: nowPulse 1.5s ease-in-out infinite;
}
@keyframes nowPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ===== TASKS PAGE ===== */
.page-header {
  padding: 18px 16px 0;
  display: flex; justify-content: space-between; align-items: center;
}
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 2px;
  background: linear-gradient(135deg, #fff, var(--red));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.add-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--red);
  color: white; border: none;
  border-radius: 10px; padding: 9px 15px;
  font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'Rajdhani', sans-serif;
  letter-spacing: 0.5px;
  box-shadow: 0 0 15px rgba(230,15,50,0.4);
  transition: all 0.2s;
}
.add-btn:active { transform: scale(0.95); box-shadow: none; }

.hw-filters {
  display: flex; gap: 7px;
  padding: 14px 16px 8px;
  overflow-x: auto; scrollbar-width: none;
}
.hw-filters::-webkit-scrollbar { display: none; }

.filter-chip {
  flex-shrink: 0; padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 0.5px;
}
.filter-chip.active {
  background: var(--red); border-color: var(--red);
  color: white; box-shadow: 0 0 10px rgba(230,15,50,0.3);
}

.hw-list { padding: 8px 14px; }

.hw-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px;
  margin-bottom: 9px;
  display: flex; align-items: flex-start; gap: 11px;
  transition: all 0.25s;
  animation: slotIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
}
.hw-card.done { opacity: 0.45; }
.hw-card.done .hw-card-title { text-decoration: line-through; color: var(--text3); }

.hw-check {
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid var(--border2);
  flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; margin-top: 1px;
}
.hw-check.checked {
  background: var(--green); border-color: var(--green); color: #000; font-size: 12px;
}

.hw-card-content { flex: 1; }
.hw-card-title { font-size: 14px; font-weight: 700; letter-spacing: 0.3px; }
.hw-card-meta { display: flex; gap: 7px; align-items: center; margin-top: 6px; flex-wrap: wrap; }

.hw-tag {
  font-size: 9px; font-weight: 700; padding: 2px 7px;
  border-radius: 5px; letter-spacing: 1px; text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}
.hw-tag.mats { background: rgba(230,15,50,0.15); color: var(--red); }
.hw-tag.ches { background: var(--green-soft); color: var(--green); }
.hw-tag.etc  { background: var(--blue-soft); color: var(--blue2); }
.hw-tag.esc  { background: var(--yellow-soft); color: var(--yellow); }
.hw-tag.psc  { background: rgba(255,64,129,0.12); color: var(--pink); }
.hw-tag.eng  { background: rgba(230,15,50,0.15); color: var(--red); }
.hw-tag.ico  { background: var(--green-soft); color: var(--green); }
.hw-tag.pbl  { background: var(--blue-soft); color: var(--blue2); }
.hw-tag.other { background: var(--surface2); color: var(--text2); }

.hw-due { font-size: 10px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
.hw-due.overdue { color: var(--red); }
.hw-due.soon { color: var(--yellow); }

.hw-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 17px; padding: 4px; flex-shrink: 0; transition: color 0.2s; }
.hw-del:active { color: var(--red); }

.empty-state { text-align: center; padding: 50px 20px; color: var(--text3); }
.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-text { font-size: 14px; letter-spacing: 0.5px; }

/* ===== SUBJECTS PAGE ===== */
.subjects-grid {
  padding: 14px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 9px;
}
.subject-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px;
  transition: border-color 0.2s, transform 0.15s;
  animation: slotIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
}
.subject-card:active { transform: scale(0.97); border-color: var(--red); }
.sub-c { font-size: 9px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; letter-spacing: 0.5px; }
.sub-n { font-size: 12px; font-weight: 700; line-height: 1.3; }
.sub-f { font-size: 10px; color: var(--text2); margin-top: 5px; }
.sub-cred {
  font-size: 9px; padding: 2px 7px; border-radius: 5px;
  background: var(--red-soft); color: var(--red);
  display: inline-block; margin-top: 7px;
  font-weight: 700; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.5px;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  border-top: 1px solid var(--border2);
  padding: 22px 18px calc(20px + env(safe-area-inset-bottom, 0px));
  width: 100%;
  transform: translateY(100%);
  transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
}
.modal::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--red), var(--blue));
  border-radius: 22px 22px 0 0;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-handle { width: 38px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; margin-bottom: 18px; }

.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text2); margin-bottom: 7px; display: block;
  font-family: 'JetBrains Mono', monospace;
}
.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 12px 13px;
  color: var(--text); font-size: 14px;
  font-family: 'Rajdhani', sans-serif;
  outline: none; transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--red); box-shadow: 0 0 10px var(--red-glow); }

.form-select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 12px 13px;
  color: var(--text); font-size: 14px;
  font-family: 'Rajdhani', sans-serif;
  outline: none; -webkit-appearance: none; cursor: pointer;
}

.submit-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--red), #ff4466);
  color: white; border: none;
  border-radius: var(--radius-sm);
  padding: 14px; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 2px; margin-top: 6px;
  box-shadow: 0 0 20px rgba(230,15,50,0.4);
  transition: all 0.2s;
}
.submit-btn:active { transform: scale(0.98); box-shadow: none; }

/* ===== NOTIFICATION BANNER ===== */
.notif-banner {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 10px);
  left: 12px; right: 12px;
  background: var(--surface);
  border: 1px solid var(--red);
  border-radius: 14px;
  padding: 13px 15px;
  display: flex; align-items: center; gap: 11px;
  box-shadow: 0 0 30px rgba(230,15,50,0.3);
  z-index: 200;
  transform: translateY(-130%);
  transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
}
.notif-banner.show { transform: translateY(0); }
.notif-icon { font-size: 22px; }
.notif-content { flex: 1; }
.notif-title { font-size: 13px; font-weight: 700; }
.notif-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.notif-close { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; }
.notif-bar {
  position: absolute; bottom: 0; left: 0;
  height: 2px; background: var(--red); width: 100%;
  border-radius: 0 0 14px 14px;
  transform-origin: left;
  animation: shrinkBar 4s linear forwards;
}
@keyframes shrinkBar { from { transform: scaleX(1); } to { transform: scaleX(0); } }

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  height: var(--nav-h);
  background: rgba(10,10,15,0.97);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  position: relative; z-index: 10;
}
.bottom-nav::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), var(--blue), transparent);
  opacity: 0.5;
}

.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  cursor: pointer; padding: 8px 0;
  color: var(--text3); transition: color 0.2s;
  position: relative;
}
.nav-item.active { color: var(--red); }
.nav-item.active::before {
  content: '';
  position: absolute; top: -1px; left: 25%; right: 25%;
  height: 2px; background: var(--red);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--red);

.nav-icon { font-size: 21px; }
.nav-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
.nav-badge {
  position: absolute; top: 5px; right: calc(50% - 18px);

  border-radius: 8px; font-size: 9px; font-weight: 700;

.web-corner {

// ===== TODAY STRIP =====
function updateTodayStrip() {
  const jsDay = new Date().getDay();
  const todayKey = DAYS[jsDay];
  document.getElementById('todayDay').textContent = DAY_FULL[todayKey].toUpperCase();
  document.getElementById('todayDate').textContent =
    new Date().toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });

  const now = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  const slots = SCHEDULE[todayKey];
  let found = null;

  for (const s of slots) {
    const sm = toMins(s.start), em = toMins(s.end);
    if (mins >= sm && mins < em) { found = { ...s, label: 'NOW' }; break; }
  }
  if (!found) {
    for (const s of slots) {
      const sm = toMins(s.start);
      if (sm > mins) { found = { ...s, label: 'NEXT' }; break; }
    }
  }

  if (found) {
    document.getElementById('nowName').textContent = found.title.replace(/^[\w\d]+\s–\s/, '');
    document.getElementById('nowTime').textContent = `${found.label} · ${fmt(found.start)} – ${fmt(found.end)}`;
  } else {
    document.getElementById('nowName').textContent = 'All done today!';
    document.getElementById('nowTime').textContent = 'Rest up 🕷️';
  }
}

// ===== DAY STRIP =====
function renderDayStrip() {

  strip.innerHTML = DAYS.map(d => `

      <div class="day-pill-name">${DAY_NAMES[d]}</div>
      <div class="day-pill-dot"></div>

  setTimeout(() => {

}

function selectDay(day) {

}

// ===== HELPERS =====
function toMins(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function fmt(t) {
  const [h,m] = t.split(':'); const hh = parseInt(h);
  return `${hh>12?hh-12:hh===0?12:hh}:${m} ${hh>=12?'PM':'AM'}`;
}

// ===== SCHEDULE =====
function renderSchedule(day) {
  const now = new Date();
  const mins = now.getHours()*60 + now.getMinutes();
  const todayKey = DAYS[now.getDay()];
  const isToday = day === todayKey;
  const slots = SCHEDULE[day];
  let html = '';
  let lastSection = '';

  slots.forEach(slot => {
    const sm = toMins(slot.start), em = toMins(slot.end);
    const isCurrent = isToday && mins >= sm && mins < em;

    if (slot.section && slot.section !== lastSection) {
      html += `<div class="section-label">${slot.section}</div>`;
      lastSection = slot.section;
    }

    html += `
      <div class="slot ${slot.type} ${isCurrent ? 'current' : ''}">
        <div class="slot-bar"></div>
        <div class="slot-icon">${slot.icon}</div>
        <div class="slot-content">
          <div class="slot-title">${slot.title}${isCurrent ? '<span class="now-badge">● NOW</span>' : ''}</div>
          ${slot.sub ? `<div class="slot-sub">${slot.sub}</div>` : ''}
        </div>
        <div class="slot-time">${fmt(slot.start)}<br>${fmt(slot.end)}</div>
      </div>`;
  });

  document.getElementById('scheduleList').innerHTML = html;
}

// ===== HOMEWORK =====
function saveHW() {
  const task = document.getElementById('hwTaskInput').value.trim();
  if (!task) { document.getElementById('hwTaskInput').style.borderColor='var(--red)'; return; }
  document.getElementById('hwTaskInput').style.borderColor='';

  homeworks.unshift({ task, subject: document.getElementById('hwSubjectSelect').value, due: document.getElementById('hwDueInput').value, done: false, id: Date.now() });
  localStorage.setItem('classmate_hw', JSON.stringify(homeworks));
  updateHWBadge(); closeModal(); renderHW();
  showNotif('✅', 'Task Added!', task.slice(0,40));
}

function renderHW() {
  const list = document.getElementById('hwList');
  let filtered = [...homeworks];
  if (hwFilter==='pending') filtered=filtered.filter(h=>!h.done);
  else if (hwFilter==='done') filtered=filtered.filter(h=>h.done);
  else if (!['all'].includes(hwFilter)) filtered=filtered.filter(h=>h.subject===hwFilter);

  if (!filtered.length) {
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🕸️</div><div class="empty-text">No tasks here, Spider!<br>Tap + ADD to create one.</div></div>`;
    return;
  }

  const today = new Date(); today.setHours(0,0,0,0);
  list.innerHTML = filtered.map(hw => {
    const due = hw.due ? new Date(hw.due) : null;
    let dueClass='', dueText='';
    if (due) {
      due.setHours(0,0,0,0);
      const diff = Math.round((due-today)/86400000);
      if (diff<0){dueClass='overdue';dueText=`Overdue ${Math.abs(diff)}d`;}
      else if(diff===0){dueClass='soon';dueText='Due Today!';}
      else if(diff===1){dueClass='soon';dueText='Due Tomorrow';}
      else{dueText=`Due in ${diff}d`;}
    }
    const ri = homeworks.indexOf(hw);
    return `
      <div class="hw-card ${hw.done?'done':''}">
        <div class="hw-check ${hw.done?'checked':''}" onclick="toggleHW(${ri})">${hw.done?'✓':''}</div>
        <div class="hw-card-content">
          <div class="hw-card-title">${hw.task}</div>
          <div class="hw-card-meta">
            <span class="hw-tag ${hw.subject}">${hw.subject.toUpperCase()}</span>
            ${dueText?`<span class="hw-due ${dueClass}">${dueText}</span>`:''}
          </div>
        </div>
        <button class="hw-del" onclick="deleteHW(${ri})">🗑</button>
      </div>`;
  }).join('');
}

function filterHW(f,el) {
  hwFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');

function deleteHW(i) { homeworks.splice(i,1); localStorage.setItem('classmate_hw',JSON.stringify(homeworks)); updateHWBadge(); renderHW(); }

function showNotif(icon,title,sub) {

  document.getElementById('notifTitle').textContent=title;
  document.getElementById('notifSub').textContent=sub;
  const bar=document.getElementById('notifBar');
  bar.style.animation='none'; bar.offsetHeight; bar.style.animation='shrinkBar 4s linear forwards';
  const b=document.getElementById('notifBanner');
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),4500);
}
function closeNotif() { document.getElementById('notifBanner').classList.remove('show'); }

function scheduleNotifications() {
  const todayKey = DAYS[new Date().getDay()];
  const slots = SCHEDULE[todayKey];
  const now = new Date();
  slots.forEach(slot => {
    if (!['college','lab'].includes(slot.type)) return;
    const [h,m] = slot.start.split(':').map(Number);
    const t = new Date(); t.setHours(h, m-5, 0, 0);
    const delay = t - now;
    if (delay > 0 && delay < 86400000) {
      setTimeout(() => showNotif('🔔', 'Class in 5 mins!', slot.title.replace(/^[\w\d]+\s–\s/,'')), delay);
    }
  });
}
