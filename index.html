<title>ClassMate – CSE Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== THEME VARIABLES ===== */
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222536;
  --border: #2a2e42;
  --text: #eef0f8;
  --text2: #8b90aa;
  --text3: #555a72;
  --accent: #6c63ff;
  --accent-soft: rgba(108,99,255,0.12);
  --green: #3ddc84;
  --green-soft: rgba(61,220,132,0.12);
  --yellow: #ffd166;
  --yellow-soft: rgba(255,209,102,0.12);
  --red: #ff6b6b;
  --red-soft: rgba(255,107,107,0.12);
  --blue: #4fc3f7;
  --blue-soft: rgba(79,195,247,0.12);
  --pink: #f48fb1;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --radius: 16px;
  --radius-sm: 10px;
  --nav-h: 70px;
  --status-h: env(safe-area-inset-top, 0px);
}

.light {
  --bg: #f0f2f8;
  --surface: #ffffff;
  --surface2: #e8eaf4;
  --border: #d8dbe8;
  --text: #1a1d2e;
  --text2: #5a5f7a;
  --text3: #9096b0;
  --accent: #5b52ee;
  --accent-soft: rgba(91,82,238,0.1);
  --green: #1a9e5c;
  --green-soft: rgba(26,158,92,0.1);
  --yellow: #c47a00;
  --yellow-soft: rgba(196,122,0,0.1);
  --red: #d93025;
  --red-soft: rgba(217,48,37,0.1);
  --blue: #0277bd;
  --blue-soft: rgba(2,119,189,0.1);
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: background 0.3s, color 0.3s;
}

.app {
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== HEADER ===== */
.header {
  padding: calc(var(--status-h) + 16px) 20px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.header-left {}
.app-name {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}
.app-sub {
  font-size: 11px;
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 1px;
}

.header-right { display: flex; gap: 8px; align-items: center; }

.icon-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
}
.icon-btn:active { transform: scale(0.93); }

/* ===== PAGE CONTAINER ===== */
.pages {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.page {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + 16px);
  display: none;
}
.page.active { display: block; }

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  height: var(--nav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  position: relative;
  z-index: 10;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 8px 0;
  color: var(--text3);
  transition: color 0.2s;
}
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 22px; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }
.nav-dot {
  position: absolute;
  top: 8px;
  right: calc(50% - 22px);
  width: 7px; height: 7px;
  background: var(--red);
  border-radius: 50%;
  display: none;
}
.nav-dot.show { display: block; }

/* ===== SCHEDULE PAGE ===== */
.day-strip {
  display: flex;
  gap: 8px;
  padding: 16px 20px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.day-strip::-webkit-scrollbar { display: none; }

.day-pill {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 16px;
  border-radius: 14px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all 0.2s;
}
.day-pill.active {
  background: var(--accent);
  border-color: var(--accent);
}
.day-pill.today-indicator {
  border-color: var(--accent);
}
.day-pill-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: 0.5px;
}
.day-pill.active .day-pill-name { color: white; }
.day-pill-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
}
.day-pill.active .day-pill-dot { background: rgba(255,255,255,0.6); }

.schedule-list {
  padding: 0 16px 8px;
}

.time-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 12px 4px 8px;
  font-family: 'JetBrains Mono', monospace;
}

.slot {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px 14px;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, border-color 0.2s;
}
.slot:active { transform: scale(0.98); }

.slot-bar {
  width: 3px;
  height: 100%;
  position: absolute;
  left: 0; top: 0;
  border-radius: 3px 0 0 3px;
}
.slot.college .slot-bar { background: var(--accent); }
.slot.lab .slot-bar { background: var(--blue); }
.slot.travel .slot-bar { background: var(--text3); }
.slot.meal .slot-bar { background: var(--yellow); }
.slot.study .slot-bar { background: var(--green); }
.slot.rest .slot-bar { background: var(--pink); }
.slot.break .slot-bar { background: var(--text3); }
.slot.sleep .slot-bar { background: var(--text3); }
.slot.club .slot-bar { background: var(--red); }

.slot-icon {
  font-size: 22px;
  flex-shrink: 0;
  width: 36px;
  text-align: center;
}

.slot-content { flex: 1; min-width: 0; }
.slot-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.slot-sub {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.slot-time {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text3);
  text-align: right;
  flex-shrink: 0;
  line-height: 1.5;
}

/* Current class highlight */
.slot.current {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.slot.current .slot-title { color: var(--accent); }

/* ===== HOMEWORK PAGE ===== */
.hw-header {
  padding: 20px 20px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.hw-title { font-size: 20px; font-weight: 800; }
.add-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: opacity 0.2s;
}
.add-btn:active { opacity: 0.85; }

.hw-filters {
  display: flex;
  gap: 8px;
  padding: 16px 20px 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.hw-filters::-webkit-scrollbar { display: none; }

.filter-chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.hw-list { padding: 8px 16px; }

.hw-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: all 0.2s;
}
.hw-card.done { opacity: 0.5; }
.hw-card.done .hw-card-title { text-decoration: line-through; }

.hw-check {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  margin-top: 1px;
}
.hw-check.checked {
  background: var(--green);
  border-color: var(--green);
  color: white;
  font-size: 13px;
}

.hw-card-content { flex: 1; }
.hw-card-title { font-size: 14px; font-weight: 700; }
.hw-card-meta {
  display: flex; gap: 8px; align-items: center;
  margin-top: 6px; flex-wrap: wrap;
}
.hw-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
  letter-spacing: 0.5px;
}
.hw-tag.mats { background: var(--accent-soft); color: var(--accent); }
.hw-tag.ches { background: var(--green-soft); color: var(--green); }
.hw-tag.etc { background: var(--blue-soft); color: var(--blue); }
.hw-tag.esc { background: var(--yellow-soft); color: var(--yellow); }
.hw-tag.psc { background: var(--red-soft); color: var(--red); }
.hw-tag.eng { background: var(--accent-soft); color: var(--accent); }
.hw-tag.ico { background: var(--green-soft); color: var(--green); }
.hw-tag.pbl { background: var(--blue-soft); color: var(--blue); }
.hw-tag.other { background: var(--surface2); color: var(--text2); }

.hw-due {
  font-size: 11px;
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
}
.hw-due.overdue { color: var(--red); }
.hw-due.soon { color: var(--yellow); }

.hw-del {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 18px;
  padding: 4px;
  flex-shrink: 0;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
  width: 100%;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
}
.modal-overlay.open .modal {
  transform: translateY(0);
}

.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; }

.form-group { margin-bottom: 16px; }
.form-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 8px;
  display: block;
}

.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }

.form-select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  outline: none;
  -webkit-appearance: none;
  cursor: pointer;
}

.submit-btn {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  padding: 15px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  margin-top: 8px;
  transition: opacity 0.2s;
}
.submit-btn:active { opacity: 0.85; }

/* ===== NOTIFICATION BANNER ===== */
.notif-banner {
  position: fixed;
  top: calc(var(--status-h) + 12px);
  left: 12px; right: 12px;
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow);
  z-index: 200;
  transform: translateY(-120%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
}
.notif-banner.show { transform: translateY(0); }
.notif-banner-icon { font-size: 24px; }
.notif-banner-content { flex: 1; }
.notif-banner-title { font-size: 13px; font-weight: 700; }
.notif-banner-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.notif-close {
  background: none; border: none; color: var(--text3);
  font-size: 20px; cursor: pointer; padding: 4px;
}

/* ===== SUBJECTS PAGE ===== */
.subjects-grid-app {
  padding: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.subject-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  transition: border-color 0.2s;
}
.subject-card:active { border-color: var(--accent); }
.sub-c { font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; }
.sub-n { font-size: 13px; font-weight: 700; line-height: 1.3; }
.sub-f { font-size: 11px; color: var(--text2); margin-top: 6px; }
.sub-cred {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 6px;
  background: var(--accent-soft);
  color: var(--accent);
  display: inline-block;
  margin-top: 8px;
  font-weight: 700;
}

/* ===== TODAY CARD ===== */
.today-hero {
  margin: 16px 16px 0;
  background: linear-gradient(135deg, var(--accent) 0%, #9b6cff 100%);
  border-radius: var(--radius);
  padding: 20px;
  color: white;
  position: relative;
  overflow: hidden;
}
.today-hero::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}
.today-hero-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; opacity: 0.8; }
.today-hero-day { font-size: 28px; font-weight: 800; margin-top: 4px; }
.today-hero-next { font-size: 13px; opacity: 0.85; margin-top: 8px; }
.today-hero-class { font-size: 15px; font-weight: 700; margin-top: 4px; }

/* Animations */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.slot { animation: slideUp 0.3s ease both; }
.slot:nth-child(1) { animation-delay: 0.02s; }
.slot:nth-child(2) { animation-delay: 0.04s; }
.slot:nth-child(3) { animation-delay: 0.06s; }
.slot:nth-child(4) { animation-delay: 0.08s; }
.slot:nth-child(5) { animation-delay: 0.10s; }
.slot:nth-child(6) { animation-delay: 0.12s; }
.slot:nth-child(7) { animation-delay: 0.14s; }

/* Progress bar for notifications */
.notif-progress {
  position: absolute;
  bottom: 0; left: 0;
  height: 3px;
  background: var(--accent);
  border-radius: 0 0 14px 14px;
  width: 100%;
  transform-origin: left;
  animation: shrink 4s linear forwards;
}
@keyframes shrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }
</style>
</head>
<body>

<!-- NOTIFICATION BANNER -->
<div class="notif-banner" id="notifBanner">
  <div class="notif-banner-icon" id="notifIcon">🔔</div>
  <div class="notif-banner-content">
    <div class="notif-banner-title" id="notifTitle">Class Starting Soon</div>
    <div class="notif-banner-sub" id="notifSub">in 5 minutes</div>
  </div>
  <button class="notif-close" onclick="closeNotif()">✕</button>
  <div class="notif-progress" id="notifProgress"></div>
</div>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="app-name">ClassMate</div>
      <div class="app-sub" id="headerSub">B/CSE · Sem II</div>
    </div>
    <div class="header-right">
      <div class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</div>
    </div>
  </div>

  <!-- PAGES -->
  <div class="pages">

    <!-- SCHEDULE PAGE -->
    <div class="page active" id="page-schedule">
      <div class="day-strip" id="dayStrip"></div>
      <div class="schedule-list" id="scheduleList"></div>
    </div>

    <!-- HOMEWORK PAGE -->
    <div class="page" id="page-homework">
      <div class="hw-header">
        <div class="hw-title">Tasks</div>
        <button class="add-btn" onclick="openAddHW()">＋ Add</button>
      </div>
      <div class="hw-filters">
        <div class="filter-chip active" onclick="filterHW('all', this)">All</div>
        <div class="filter-chip" onclick="filterHW('pending', this)">Pending</div>
        <div class="filter-chip" onclick="filterHW('done', this)">Done</div>
        <div class="filter-chip" onclick="filterHW('mats', this)">Maths</div>
        <div class="filter-chip" onclick="filterHW('ches', this)">Chemistry</div>
        <div class="filter-chip" onclick="filterHW('psc', this)">Python</div>
        <div class="filter-chip" onclick="filterHW('etc', this)">AI</div>
      </div>
      <div class="hw-list" id="hwList"></div>
    </div>

    <!-- SUBJECTS PAGE -->
    <div class="page" id="page-subjects">
      <div style="padding: 20px 16px 8px;">
        <div style="font-size: 20px; font-weight: 800;">Subjects</div>
        <div style="font-size: 12px; color: var(--text2); margin-top: 4px;">II Semester · Chemistry Cycle</div>
      </div>
      <div class="subjects-grid-app" id="subjectGrid"></div>

// ===== SCHEDULE RENDER =====
function toMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function renderSchedule(day) {
  const now = new Date();
  const currentMins = now.getHours() * 60 + now.getMinutes();
  const jsDayMap = ['sun','mon','tue','wed','thu','fri','sat'];
  const todayKey = jsDayMap[now.getDay()] || 'mon';
  const isToday = day === todayKey;

  const slots = SCHEDULE[day];
  let html = '';
  let lastSection = '';

  slots.forEach(slot => {
    const startM = toMins(slot.start);
    const endM = toMins(slot.end);
    const isCurrent = isToday && currentMins >= startM && currentMins < endM;

    if (slot.section && slot.section !== lastSection) {
      html += `<div class="time-section-label">${slot.section}</div>`;
      lastSection = slot.section;
    }

    const fmt = t => {
      const [h, m] = t.split(':');
      const hh = parseInt(h);
      return `${hh > 12 ? hh - 12 : hh}:${m} ${hh >= 12 ? 'PM' : 'AM'}`;
    };

    html += `
      <div class="slot ${slot.type} ${isCurrent ? 'current' : ''}">
        <div class="slot-bar"></div>
        <div class="slot-icon">${slot.icon}</div>
        <div class="slot-content">
          <div class="slot-title">${slot.title}${isCurrent ? ' <span style="font-size:10px;color:var(--accent)">● NOW</span>' : ''}</div>
          ${slot.sub ? `<div class="slot-sub">${slot.sub}</div>` : ''}
        </div>
        <div class="slot-time">${fmt(slot.start)}<br>${fmt(slot.end)}</div>
      </div>
    `;
  });

  document.getElementById('scheduleList').innerHTML = html;
}

      <div class="sub-cred">${s.credits} Credit${s.credits !== 1 ? 's' : ''}</div>
    </div>
  `).join('');
}

function renderHW() {
  const list = document.getElementById('hwList');
  let filtered = [...homeworks];

  if (hwFilter === 'pending') filtered = filtered.filter(h => !h.done);
  else if (hwFilter === 'done') filtered = filtered.filter(h => h.done);
  else if (!['all'].includes(hwFilter)) filtered = filtered.filter(h => h.subject === hwFilter);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No tasks here!<br>Tap + Add to create one.</div></div>`;
    return;
  }

  const today = new Date(); today.setHours(0,0,0,0);

  list.innerHTML = filtered.map((hw, i) => {
    const due = hw.due ? new Date(hw.due) : null;
    let dueClass = '', dueText = '';
    if (due) {
      due.setHours(0,0,0,0);
      const diff = Math.round((due - today) / 86400000);
      if (diff < 0) { dueClass = 'overdue'; dueText = `Overdue by ${Math.abs(diff)}d`; }
      else if (diff === 0) { dueClass = 'soon'; dueText = 'Due Today!'; }
      else if (diff === 1) { dueClass = 'soon'; dueText = 'Due Tomorrow'; }
      else { dueText = `Due in ${diff}d`; }
    }
    const realIdx = homeworks.indexOf(hw);
    return `
      <div class="hw-card ${hw.done ? 'done' : ''}">
        <div class="hw-check ${hw.done ? 'checked' : ''}" onclick="toggleHW(${realIdx})">
          ${hw.done ? '✓' : ''}
        </div>
        <div class="hw-card-content">
          <div class="hw-card-title">${hw.task}</div>
          <div class="hw-card-meta">
            <span class="hw-tag ${hw.subject}">${hw.subject.toUpperCase()}</span>
            ${dueText ? `<span class="hw-due ${dueClass}">${dueText}</span>` : ''}
          </div>
        </div>
        <button class="hw-del" onclick="deleteHW(${realIdx})">🗑</button>
      </div>
    `;
  }).join('');
}

function filterHW(f, el) {
  hwFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderHW();
}

function toggleHW(i) {
  homeworks[i].done = !homeworks[i].done;
  saveHWToStorage();
  updateHWBadge();
  renderHW();
}

function deleteHW(i) {
  homeworks.splice(i, 1);
  saveHWToStorage();
  updateHWBadge();
  renderHW();
}

function updateHWBadge() {
  const pending = homeworks.filter(h => !h.done).length;
  document.getElementById('hwDot').classList.toggle('show', pending > 0);
}

function openAddHW() {
  document.getElementById('hwDueInput').value = new Date().toISOString().split('T')[0];
  document.getElementById('hwTaskInput').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('hwTaskInput').focus(), 400);
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveHW() {
  const task = document.getElementById('hwTaskInput').value.trim();
  if (!task) { document.getElementById('hwTaskInput').style.borderColor = 'var(--red)'; return; }
  document.getElementById('hwTaskInput').style.borderColor = '';

  homeworks.unshift({
    task,
    subject: document.getElementById('hwSubjectSelect').value,
    due: document.getElementById('hwDueInput').value,
    done: false,
    id: Date.now()
  });
  saveHWToStorage();
  updateHWBadge();
  closeModal();
  renderHW();
  showNotif('✅', 'Task Added', task);
}

// ===== PAGES =====
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
}

// ===== THEME =====
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  updateThemeBtn();
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
}

// ===== NOTIFICATIONS =====
function showNotif(icon, title, sub) {
  document.getElementById('notifIcon').textContent = icon;
  document.getElementById('notifTitle').textContent = title;
  document.getElementById('notifSub').textContent = sub;

  const bar = document.getElementById('notifProgress');
  bar.style.animation = 'none';
  bar.offsetHeight; // reflow
  bar.style.animation = 'shrink 4s linear forwards';

  const banner = document.getElementById('notifBanner');
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 4500);
}

function closeNotif() {
  document.getElementById('notifBanner').classList.remove('show');
}

function scheduleNotifications() {
  const jsDayMap = ['sun','mon','tue','wed','thu','fri','sat'];
  const todayKey = jsDayMap[new Date().getDay()] || 'mon';
  const slots = SCHEDULE[todayKey];
  const now = new Date();

  slots.forEach(slot => {
    if (!['college','lab'].includes(slot.type)) return;
    const [h, m] = slot.start.split(':').map(Number);
    const classTime = new Date();
    classTime.setHours(h, m - 5, 0, 0); // 5 min before
    const delay = classTime - now;
    if (delay > 0 && delay < 86400000) {
      setTimeout(() => {
        showNotif('🔔', 'Class in 5 minutes', slot.title.replace(/^[\w\d]+\s–\s/, ''));
      }, delay);
    }
  });
}

// ===== LOAD THEME =====
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'light') { isDark = false; document.body.classList.add('light'); }
